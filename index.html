<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình bày về Kỹ năng viết CV</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="presentation-shell">
        <canvas id="decorCanvas" class="decor-canvas" aria-hidden="true"></canvas>
        <div class="geo-elements" aria-hidden="true">
            <div class="geo-item pos1" aria-hidden="true">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                    <rect x="8" y="8" width="84" height="84" rx="12" fill="var(--primary)"/>
                </svg>
            </div>
            <div class="geo-item pos2" aria-hidden="true">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                    <circle cx="50" cy="50" r="40" fill="var(--primary-light)"/>
                </svg>
            </div>
            <div class="geo-item pos3" aria-hidden="true">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                    <polygon points="50,6 94,90 6,90" fill="#e6f2fa"/>
                </svg>
            </div>
            <div class="geo-item pos4" aria-hidden="true">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
                    <rect x="20" y="20" width="60" height="60" rx="6" fill="#f0f7fb"/>
                </svg>
            </div>
        </div>
        <header class="topbar">
            <div class="brand">
                <div class="brand-badge pulse">Nhóm 6</div>
                <div>
                    <p class="eyebrow">Bài trình bày nhóm về</p>
                    <h1>Kỹ năng viết CV</h1>
                </div>
            </div>
            <div class="chip">Slide 1 / 23</div>
        </header>

        <main class="artboard">
            <aside class="slide-sidebar">
                <div class="sidebar-title">Danh sách slide</div>
                <div class="thumb-list" id="thumbList"></div>
            </aside>

            <section class="preview-panel" id="previewPanel" tabindex="0" role="button" aria-label="Mở slide đang chọn">
                <div class="preview-toolbar">
                    <span class="preview-label">Slide đang chọn</span>
                    <div class="toolbar-actions">
                        <button class="action-btn" id="fullscreenBtn" type="button">⛶ Fullscreen</button>
                        <div class="chip preview-chip" id="previewChip">Slide 1 / 23</div>
                    </div>
                </div>
                <div class="preview-stage" id="previewStage"></div>
            </section>
        </main>

        <div class="slide-nav" id="slideNav" aria-label="Điều hướng slide"></div>
    </div>

    <div class="presenter-overlay" id="presenterOverlay" aria-hidden="true">
        <div class="presenter-frame">
            <canvas id="presenterDecorCanvas" class="presenter-decor-canvas" aria-hidden="true"></canvas>
            <button class="presenter-close" id="closePresenter" type="button" aria-label="Đóng trình chiếu">×</button>
            <div class="presenter-stage" id="presenterStage"></div>
                <div class="presenter-controls">
                <button class="nav-btn" id="prevBtn" type="button">← Trước</button>
                <div class="presenter-counter" id="presenterCounter">1 / 23</div>
                <button class="nav-btn" id="nextBtn" type="button">Sau →</button>
            </div>
        </div>
    </div>

    <script src="JS/main.js"></script>
</body>
</html>
