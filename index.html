<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình bày về Kỹ năng viết CV</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="presentation-shell">
        <canvas id="decorCanvas" class="decor-canvas" aria-hidden="true"></canvas>
        <header class="topbar">
            <div class="brand">
                <div class="brand-badge pulse">Nhóm 6</div>
                <div>
                    <p class="eyebrow">Bài trình bày nhóm về</p>
                    <h1>Kỹ năng viết CV</h1>
                </div>
            </div>
            <div class="chip">Slide 1 / 20</div>
        </header>

        <main class="artboard">
            <aside class="slide-sidebar">
                <div class="sidebar-title">Danh sách slide</div>
                <div class="thumb-list">
                    <button class="thumb-item active" data-slide-index="0" type="button">
                        <span class="thumb-number">01</span>
                        <span class="thumb-icon">📘</span>
                        <div><strong>Giới thiệu</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="1" type="button">
                        <span class="thumb-number">02</span>
                        <span class="thumb-icon">🎯</span>
                        <div><strong>Mục tiêu</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="2" type="button">
                        <span class="thumb-number">03</span>
                        <span class="thumb-icon">💼</span>
                        <div><strong>Kinh nghiệm: Vì sao & Sắp xếp</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="3" type="button">
                        <span class="thumb-number">04</span>
                        <span class="thumb-icon">📋</span>
                        <div><strong>Những nội dung cần có</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="4" type="button">
                        <span class="thumb-number">05</span>
                        <span class="thumb-icon">📝</span>
                        <div><strong>Ví dụ kinh nghiệm</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="5" type="button">
                        <span class="thumb-number">06</span>
                        <span class="thumb-icon">🎓</span>
                        <div><strong>Học vấn & Chứng chỉ</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="6" type="button">
                        <span class="thumb-number">07</span>
                        <span class="thumb-icon">🧭</span>
                        <div><strong>Vai trò</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="7" type="button">
                        <span class="thumb-number">08</span>
                        <span class="thumb-icon">🖼️</span>
                        <div><strong>Ảnh minh họa</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="8" type="button">
                        <span class="thumb-number">09</span>
                        <span class="thumb-icon">❓</span>
                        <div><strong>Tại sao kỹ năng</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="9" type="button">
                        <span class="thumb-number">10</span>
                        <span class="thumb-icon">📚</span>
                        <div><strong>Phân loại Kỹ năng</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="10" type="button">
                        <span class="thumb-number">11</span>
                        <span class="thumb-icon">⚡</span>
                        <div><strong>Quy tắc & Lỗi</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="11" type="button">
                        <span class="thumb-number">12</span>
                        <span class="thumb-icon">🧩</span>
                        <div><strong>Ví dụ theo nghề</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="12" type="button">
                        <span class="thumb-number">13</span>
                        <span class="thumb-icon">📄</span>
                        <div><strong>CV mẫu</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="13" type="button">
                        <span class="thumb-number">14</span>
                        <span class="thumb-icon">💡</span>
                        <div><strong>Bài học</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="14" type="button">
                        <span class="thumb-number">15</span>
                        <span class="thumb-icon">🧾</span>
                        <div><strong>Tổng kết</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="15" type="button">
                        <span class="thumb-number">16</span>
                        <span class="thumb-icon">❓</span>
                        <div><strong>Trắc nghiệm 1</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="16" type="button">
                        <span class="thumb-number">17</span>
                        <span class="thumb-icon">❓</span>
                        <div><strong>Trắc nghiệm 2</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="17" type="button">
                        <span class="thumb-number">18</span>
                        <span class="thumb-icon">❓</span>
                        <div><strong>Trắc nghiệm 3</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="18" type="button">
                        <span class="thumb-number">19</span>
                        <span class="thumb-icon">❓</span>
                        <div><strong>Trắc nghiệm 4</strong></div>
                    </button>
                    <button class="thumb-item" data-slide-index="19" type="button">
                        <span class="thumb-number">20</span>
                        <span class="thumb-icon">❓</span>
                        <div><strong>Trắc nghiệm 5</strong></div>
                    </button>
                </div>
            </aside>

            <section class="preview-panel" id="previewPanel" tabindex="0" role="button" aria-label="Mở slide đang chọn">
                <div class="preview-toolbar">
                    <span class="preview-label">Slide đang chọn</span>
                    <div class="toolbar-actions">
                        <button class="action-btn" id="fullscreenBtn" type="button">⛶ Fullscreen</button>
                        <div class="chip preview-chip" id="previewChip">Slide 1 / 20</div>
                    </div>
                </div>
                <div class="preview-stage" id="previewStage"></div>
            </section>
        </main>

        <div class="slide-nav" aria-label="Điều hướng slide">
            <span class="active" data-index="0"></span>
            <span data-index="1"></span>
            <span data-index="2"></span>
            <span data-index="3"></span>
            <span data-index="4"></span>
            <span data-index="5"></span>
            <span data-index="6"></span>
            <span data-index="7"></span>
            <span data-index="8"></span>
            <span data-index="9"></span>
            <span data-index="10"></span>
            <span data-index="11"></span>
            <span data-index="12"></span>
            <span data-index="13"></span>
            <span data-index="14"></span>
            <span data-index="15"></span>
            <span data-index="16"></span>
            <span data-index="17"></span>
            <span data-index="18"></span>
            <span data-index="19"></span>
        </div>
    </div>

    <div class="presenter-overlay" id="presenterOverlay" aria-hidden="true">
        <div class="presenter-frame">
            <canvas id="presenterDecorCanvas" class="presenter-decor-canvas" aria-hidden="true"></canvas>
            <button class="presenter-close" id="closePresenter" type="button" aria-label="Đóng trình chiếu">×</button>
            <div class="presenter-stage" id="presenterStage"></div>
                <div class="presenter-controls">
                <button class="nav-btn" id="prevBtn" type="button">← Trước</button>
                <div class="presenter-counter" id="presenterCounter">1 / 20</div>
                <button class="nav-btn" id="nextBtn" type="button">Sau →</button>
            </div>
        </div>
    </div>

    <script src="JS/main.js"></script>
</body>
</html>
